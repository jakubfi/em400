[general]
machine = mera400
speed_real = true
emulation_quantum_us = 100

[log]
enabled = false
file = em400.log
components = em4h
line_buffered = true

[sound]
enabled = true
backend = auto
device =
rate = 48000
buffer_len = 128
latency = 20
volume = 10


# Base MERA-400: one Elwro module, a single terminal in a character channel
[machine.mera400]
name = MERA-400
cpu.clock_period = 10
cpu.stop_on_nomem = true
cpu.user_io_illegal = false
cpu.awp = true
cpu.modifications = false
memory.elwro_modules = 1
memory.mega_modules = 0
memory.hardwired_segments = 2
#memory.mega_prom = mega_prom.img
#memory.preload = program.bin
channel.15 = char
dev.15.4.type = terminal
dev.15.4.port = 32000
dev.15.4.speed = 9600


# MX-16: CPU modifications on, MEGA memory, MULTIX with winchester,
# plus a real-time clock and a terminal in the character channel.
[machine.mx16]
name = MX-16
cpu.clock_period = 10
cpu.stop_on_nomem = true
cpu.user_io_illegal = false
cpu.awp = true
cpu.modifications = true
memory.elwro_modules = 1
memory.mega_modules = 16
memory.hardwired_segments = 2
#memory.mega_prom = mega_prom.img
#memory.preload = program.bin
channel.1 = multix
channel.15 = char
dev.1.20.type = floppy
dev.1.20.image = floppy.e4i
dev.1.21.type = floppy
dev.1.21.image = floppy.e4i
dev.1.28.type = winchester
dev.1.28.image = winchester.e4i
dev.15.0.type = rtclock
#dev.15.0.prom = rtclock_prom.bin
dev.15.4.type = terminal
dev.15.4.port = 32000
dev.15.4.speed = 9600
