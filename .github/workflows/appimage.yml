name: AppImage

on:
  push:
    tags: ['release-*']      # tagged release -> build + attach to the GitHub Release
    branches: ['em400-next'] # TEMPORARY: exercise the workflow on the dev branch (remove before merge)
  workflow_dispatch: {}      # manual ad-hoc test build (artifact only)

jobs:
  appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04    # old glibc (2.35) baseline -> portable AppImage
    env:
      BUILD_TYPE: Release
      # ubuntu-22.04 ships GCC 11, too old for the C23 the sources use; the
      # 22.04 pin is only for the old glibc baseline, so use a newer compiler.
      CC: gcc-13
      CXX: g++-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # so `git describe --tags` resolves the version

      - name: Install GCC 13 and system dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y \
            gcc-13 g++-13 \
            libgl1-mesa-dev libegl1-mesa-dev \
            libuv1-dev libncurses-dev libreadline-dev \
            libpulse-dev libasound2-dev \
            flex libfl-dev bison \
            file desktop-file-utils \
            libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0

      # jammy's Qt is 6.2, whose QSoundEffect rebuilds its GStreamer pipeline per
      # play and clips the attack. A newer Qt uses the self-contained FFmpeg
      # backend (no GStreamer element bundling) and a persistent audio sink.
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtmultimedia'
          cache: true

      - name: Build and install emawp
        run: git clone https://github.com/jakubfi/emawp && cd emawp && cmake -B build && cmake --build build && sudo cmake --install build && sudo ldconfig

      - name: Build and install emcrk
        run: git clone https://github.com/jakubfi/emcrk && cd emcrk && cmake -B build && cmake --build build && sudo cmake --install build && sudo ldconfig

      - name: Build and install emdas
        run: git clone https://github.com/jakubfi/emdas && cd emdas && cmake -B build && cmake --build build && sudo cmake --install build && sudo ldconfig

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Build AppImage
        env:
          QMAKE: ${{env.QT_ROOT_DIR}}/bin/qmake
        run: bash packaging/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: em400-appimage
          path: dist/em400-*.AppImage
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/release-')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/em400-*.AppImage
